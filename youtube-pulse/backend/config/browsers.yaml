browsers:
  google:
    port: 9222
    profile_dir: ~/chrome-profiles/google
    services:
      - google_sheets
      - gmail
      - google_drive
    max_tabs: 5
    timeout_seconds: 30

  meta:
    port: 9223
    profile_dir: ~/chrome-profiles/meta
    services:
      - meta_business_suite
      - ads_manager
    max_tabs: 3
    timeout_seconds: 30

  general:
    port: 9224
    profile_dir: ~/chrome-profiles/general
    services:
      - naver
      - coupang
      - default
    max_tabs: 5
    timeout_seconds: 30

cdp_init:
  download_path: ~/Downloads/jarvis-browser
  permissions:
    - clipboardReadWrite
    - notifications
    - geolocation
  retry:
    max_attempts: 3
    backoff_base: 2
    backoff_max: 30
